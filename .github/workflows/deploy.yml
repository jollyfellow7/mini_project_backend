# env는 이 repo의 GitHub Actions Secrets → EC2 docker run -e 로만 주입 (EC2 .env 없음)
# 프론트(Vercel)에는 API_URL만 — GEMINI/DATABASE는 백엔드 시크릿 전용

name: Mini API 빌드 · Docker Hub · EC2 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/mini_project
  DOCKER_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: 배포용 시크릿 확인
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::DATABASE_URL 시크릿이 필요합니다 (Neon postgresql://...?sslmode=require)."
            exit 1
          fi
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_API_KEY 시크릿이 필요합니다."
            exit 1
          fi
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_USERNAME }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "::error::EC2_HOST, EC2_USERNAME, EC2_SSH_KEY 가 필요합니다."
            exit 1
          fi

      - name: EC2 배포 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            docker stop mini-cleaning-api || true
            docker rm mini-cleaning-api || true
            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            CORS_ENV=""
            if [ -n '${{ secrets.CORS_ORIGINS }}' ]; then
              CORS_ENV="-e CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
            fi
            docker run -d \
              --name mini-cleaning-api \
              --restart always \
              -p 8080:8080 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              $CORS_ENV \
              ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            sleep 15
            curl -fsS http://127.0.0.1:8080/health
